version: '3.8'

# Configuration pour le développement
# Utilisation: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # Base de données MongoDB (même configuration)
  mongodb:
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

  # Backend en mode développement
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ebenor-creation?authSource=admin
    volumes:
      # Montage des sources pour le hot reload
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/.env:/app/.env:ro
      # Volumes pour les logs et uploads
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    ports:
      - "5000:5000"
      - "9229:9229" # Port pour le debugging Node.js
    command: npm run dev
    depends_on:
      - mongodb

  # Frontend en mode développement
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      # Montage des sources pour le hot reload
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/next.config.js:/app/next.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      # Exclure node_modules pour éviter les conflits
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: ebenor-dev-network